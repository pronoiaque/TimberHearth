name: Deploy to GitHub Pages

on:
  # Déploiement automatique à chaque push sur main
  push:
    branches: [main]
  # Lancement manuel depuis l'onglet Actions
  workflow_dispatch:

# Permissions requises par les actions officielles Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; ne pas annuler un run en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check (bundle + portée + blocs vitaux)
        run: npm run check

      - name: Build (base /TimberHearth/)
        run: npm run build
        env:
          GHPAGES: "1"

      - name: SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
